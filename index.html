<!DOCTYPE html>
<html lang="ca">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Balance</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #09090b;
            color: #fafafa;
        }
    </style>
</head>
<body class="min-h-screen flex flex-col justify-between selection:bg-zinc-800 selection:text-white">

    <!-- Capçalera -->
    <header class="border-b border-zinc-800/80 bg-zinc-950/50 backdrop-blur-md sticky top-0 z-10">
        <div class="max-w-xl mx-auto px-6 h-16 flex items-center justify-between">
            <span class="font-semibold tracking-tight text-sm text-zinc-200">Balance</span>
            <div class="text-xs font-medium text-zinc-400 bg-zinc-900 border border-zinc-800 px-3 py-1 rounded-full">
                Despeses
            </div>
        </div>
    </header>

    <!-- Contingut Principal -->
    <main class="max-w-xl w-full mx-auto px-6 py-10 flex-1 space-y-8">
        
        <!-- Caixa de Resum -->
        <section class="bg-zinc-900/60 border border-zinc-800/80 rounded-2xl p-6 shadow-sm">
            <h2 class="text-xs font-medium uppercase tracking-wider text-zinc-400">Balanç Total</h2>
            <div id="total-balance" class="text-3xl font-bold tracking-tight text-white mt-2">
                0,00 €
            </div>
        </section>

        <!-- Formulari d'Entrada -->
        <section class="bg-zinc-900/60 border border-zinc-800/80 rounded-2xl p-6 shadow-sm">
            <h2 class="text-xs font-medium uppercase tracking-wider text-zinc-400 mb-4">Afegir Transacció</h2>
            <form id="expense-form" class="space-y-4">
                <div>
                    <label class="block text-xs text-zinc-400 mb-1.5 font-medium">Descripció</label>
                    <input type="text" id="desc" placeholder="Sopar, transport..." required class="w-full bg-zinc-950 border border-zinc-800 rounded-xl px-4 py-2.5 text-sm text-zinc-100 placeholder-zinc-600 focus:outline-none focus:border-zinc-600 transition">
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-xs text-zinc-400 mb-1.5 font-medium">Import</label>
                        <input type="number" step="0.01" id="amount" placeholder="0,00" required class="w-full bg-zinc-950 border border-zinc-800 rounded-xl px-4 py-2.5 text-sm text-zinc-100 placeholder-zinc-600 focus:outline-none focus:border-zinc-600 transition">
                    </div>
                    <div>
                        <label class="block text-xs text-zinc-400 mb-1.5 font-medium">Pagador</label>
                        <input type="text" id="payer" placeholder="Nom" required class="w-full bg-zinc-950 border border-zinc-800 rounded-xl px-4 py-2.5 text-sm text-zinc-100 placeholder-zinc-600 focus:outline-none focus:border-zinc-600 transition">
                    </div>
                </div>
                <button type="submit" class="w-full bg-zinc-100 hover:bg-white text-zinc-900 font-medium py-2.5 rounded-xl text-sm transition mt-2">
                    Afegir despesa
                </button>
            </form>
        </section>

        <!-- Llista de Transaccions -->
        <section class="space-y-3">
            <h2 class="text-xs font-medium uppercase tracking-wider text-zinc-400">Activitat</h2>
            <div id="transactions-list" class="space-y-2">
                <!-- Les transaccions s'injectaran aquí -->
            </div>
        </section>

    </main>

    <!-- Peu de pàgina -->
    <footer class="border-t border-zinc-800/80 py-6 text-center text-xs text-zinc-500">
        Emmagatzematge local activat
    </footer>

    <!-- Lògica de JavaScript -->
    <script>
        let transactions = JSON.parse(localStorage.getItem('balance_transactions')) || [];

        const form = document.getElementById('expense-form');
        const descInput = document.getElementById('desc');
        const amountInput = document.getElementById('amount');
        const payerInput = document.getElementById('payer');
        const listContainer = document.getElementById('transactions-list');
        const totalBalanceEl = document.getElementById('total-balance');

        function render() {
            listContainer.innerHTML = '';
            let total = 0;

            if (transactions.length === 0) {
                listContainer.innerHTML = `
                    <div class="bg-zinc-900/40 border border-zinc-800/50 rounded-xl p-4 text-center text-sm text-zinc-500">
                        Encara no hi ha cap transacció registrada.
                    </div>
                `;
            }

            transactions.forEach((tx, index) => {
                total += tx.amount;
                listContainer.innerHTML += `
                    <div class="bg-zinc-900/60 border border-zinc-800/80 rounded-xl p-4 flex items-center justify-between">
                        <div>
                            <div class="text-sm font-medium text-zinc-200">${tx.desc}</div>
                            <div class="text-xs text-zinc-500 mt-0.5">Pagat per <span class="text-zinc-400">${tx.payer}</span></div>
                        </div>
                        <div class="flex items-center gap-4">
                            <span class="text-sm font-semibold text-zinc-100">${tx.amount.toFixed(2).replace('.', ',')} €</span>
                            <button onclick="removeTx(${index})" class="text-xs text-zinc-500 hover:text-red-400 transition">Eliminar</button>
                        </div>
                    </div>
                `;
            });

            totalBalanceEl.textContent = `${total.toFixed(2).replace('.', ',')} €`;
            localStorage.setItem('balance_transactions', JSON.stringify(transactions));
        }

        form.addEventListener('submit', (e) => {
            e.preventDefault();
            const newTx = {
                desc: descInput.value.trim(),
                amount: parseFloat(amountInput.value),
                payer: payerInput.value.trim()
            };

            transactions.push(newTx);
            descInput.value = '';
            amountInput.value = '';
            payerInput.value = '';
            render();
        });

        function removeTx(index) {
            transactions.splice(index, 1);
            render();
        }

        window.onload = render;
    </script>
</body>
</html>
